spring:
  application:
    name: product-service
  data:
    web:
      pageable:
        default-page-size: 10
        page-parameter: page
        size-parameter: size
        sort-parameter: sort
        one-indexed-parameters: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB
  datasource:
    url: jdbc:postgresql://localhost:5432/product_db
    username: birbuket
    password: arxideya464
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083

# Lokal şəkil URL-ləri: frontend başqa portdasa tam ünvan lazımdır (nisbi /uploads/ yalnız eyni origində işləyir)
app:
  upload:
    dir: uploads
  media:
    public-base-url: http://localhost:${server.port}

aws:
  s3:
    # Boş və ya your-bucket-name qalsa şəkillər lokal uploads/ qovluğuna yazılır
    bucket-name: ${AWS_S3_BUCKET_NAME:}
    region: ${AWS_S3_REGION:eu-north-1}
    use-public-acl: false
    enabled: ${AWS_S3_ENABLED:true}

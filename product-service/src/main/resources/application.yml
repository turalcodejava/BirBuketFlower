spring:
  application:
    name: product-service
  data:
    web:
      pageable:
        default-page-size: 10
        page-parameter: page
        size-parameter: size
        sort-parameter: sort
        one-indexed-parameters: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:postgresql://localhost:5432/product_db}
    username: ${PRODUCT_DB_USERNAME:birbuket}
    password: ${PRODUCT_DB_PASSWORD:arxideya464}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${PRODUCT_JPA_DDL_AUTO:update}
    show-sql: ${PRODUCT_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: ${PRODUCT_SECURITY_USER:product-service}
      password: ${PRODUCT_SECURITY_PASSWORD:product-service}

server:
  port: 8083

# Lokal şəkil URL-ləri: frontend başqa portdasa tam ünvan lazımdır (nisbi /uploads/ yalnız eyni origində işləyir)
app:
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
    product-folder: ${APP_UPLOAD_PRODUCT_FOLDER:product_image}
    category-folder: ${APP_UPLOAD_CATEGORY_FOLDER:categories}
  media:
    public-base-url: ${APP_MEDIA_PUBLIC_BASE_URL:http://localhost:${server.port}}

aws:
  s3:
    # Boş və ya your-bucket-name qalsa şəkillər lokal uploads/ qovluğuna yazılır
    bucket-name: ${AWS_S3_BUCKET_NAME:}
    region: ${AWS_S3_REGION:eu-north-1}
    use-public-acl: false
    enabled: ${AWS_S3_ENABLED:false}

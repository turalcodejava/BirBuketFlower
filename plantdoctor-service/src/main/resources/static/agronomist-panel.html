<!doctype html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agronomist Panel</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; background: #f5f7fb; color: #1f2937; }
        h1 { margin-bottom: 6px; }
        .note { margin-top: 0; color: #4b5563; }
        .toolbar { margin: 16px 0; align-items: center; gap: 12px; display: flex; flex-wrap: wrap; }
        button { background: #2563eb; color: white; border: 0; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: 10px; vertical-align: top; }
        th { background: #eef2ff; }
        textarea { width: 100%; min-height: 70px; }
        .status-pending { color: #b45309; font-weight: bold; }
        .status-reserved { color: #7c3aed; font-weight: bold; }
        .status-completed { color: #047857; font-weight: bold; }
        label { margin-right: 6px; }
        input.agronomid { width: 80px; padding: 6px; border-radius: 4px; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>
<h1>Agronomist Panel</h1>
<p class="note">HOME_VISIT və CONSULTATION: əvvəl <strong>Rezerv / qəbul et</strong> → istifadəçiyə qəbul məktubu; sonra yekun cavab. Göndərkən <strong>aqronomistId</strong> lazımdır.</p>

<div class="toolbar">
    <button onclick="loadRows()">Yenilə</button>
    <label for="agronomid">Agronomist ID:</label>
    <input id="agronomid" class="agronomid" type="number" value="1" min="1" />
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Növ</th>
        <th>Bitki</th>
        <th>Email</th>
        <th>Simptom</th>
        <th>Status</th>
        <th>Əməliyyat</th>
    </tr>
    </thead>
    <tbody id="rows"></tbody>
</table>

<script>
    const base = "/api/plantdoctor/agronomist";

    function agronomistId() {
        const v = Number(document.getElementById("agronomid").value.trim());
        return v > 0 ? v : 1;
    }

    function esc(value) {
        if (value == null) return "";
        return String(value).replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[s]));
    }

    async function loadRows() {
        const res = await fetch(base + "/diagnosis");
        const json = await res.json();
        const data = (json && json.data) || [];
        const tbody = document.getElementById("rows");
        tbody.innerHTML = data.map(item => {
            const st = item.status || "";
            const cls =
                st === "COMPLETED" ? "status-completed" :
                st === "RESERVED" ? "status-reserved" : "status-pending";
            const kind = item.kind || "";
            const id = item.id;
            let actions = "";

            const taId = kind + "-" + id;

            if (kind === "HOME_VISIT") {
                if (st === "PENDING") {
                    actions +=
                        `<button type="button" onclick="reserve(${id})">Rezerv et (PENDING→RESERVED)</button>`;
                }
                if (st === "RESERVED") {
                    actions +=
                        `<div style="margin-top:8px"><textarea id="reply-${taId}" placeholder="Yekun cavab (RESERVED→COMPLETED)..."></textarea><br/><button type="button" onclick="sendReply('${kind}', ${id})">Yekunlaşdır</button></div>`;
                }
            } else if (kind === "CONSULTATION") {
                if (st === "PENDING") {
                    actions +=
                        `<button type="button" onclick="reserveConsultation(${id})">Qəbul et (PENDING→RESERVED)</button>`;
                }
                if (st === "RESERVED") {
                    actions +=
                        `<div style="margin-top:8px"><textarea id="reply-${taId}" placeholder="Yekun cavab..."></textarea><br/><button type="button" onclick="sendReply('${kind}', ${id})">Müraciətə cavab</button></div>`;
                }
            }

            return `<tr>
                <td>${id}</td>
                <td><strong>${esc(kind)}</strong></td>
                <td>${esc(item.plantType)}</td>
                <td>${esc(item.email)}</td>
                <td>${esc(item.symptoms)}</td>
                <td class="${cls}">${esc(st)}</td>
                <td>${actions}</td>
            </tr>`;
        }).join("");
    }

    async function reserve(id) {
        const body = { agronomistId: agronomistId() };
        const res = await fetch(`/api/plantdoctor/agronomist/home-visit/${id}/reserve`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            alert("Xeta: " + await res.text());
            return;
        }
        await loadRows();
    }

    async function reserveConsultation(id) {
        const body = { agronomistId: agronomistId() };
        const res = await fetch(`/api/plantdoctor/agronomist/consultation/${id}/reserve`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            alert("Xeta: " + await res.text());
            return;
        }
        await loadRows();
    }

    async function sendReply(kind, id) {
        const taId = kind + "-" + id;
        const textarea = document.getElementById("reply-" + taId);
        const txt = textarea ? textarea.value.trim() : "";
        if (!txt) {
            alert("Cavab boş ola bilməz");
            return;
        }
        const path =
            kind === "HOME_VISIT"
                ? `/api/plantdoctor/agronomist/home-visit/${id}/reply`
                : `/api/plantdoctor/agronomist/consultation/${id}/reply`;
        const res = await fetch(path, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                agronomistId: agronomistId(),
                response: txt
            })
        });
        if (!res.ok) {
            alert("Xeta: " + await res.text());
            return;
        }
        if (textarea) textarea.value = "";
        await loadRows();
    }

    loadRows();
</script>
</body>
</html>

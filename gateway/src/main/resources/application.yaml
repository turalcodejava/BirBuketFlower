spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: 15MB
  cloud:
    gateway:
      routes:
          # Auth Service ucun
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1   # /api/auth/xyz -> /auth/xyz

          # Product Service ucun (backend @RequestMapping("/api/product") — prefix silinməməlidir)
        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/product/**
          filters:
            - name: RequestSize
              args:
                maxSize: 16MB

        # Yüklənmiş şəkillər (məhsul cavabındakı /uploads/... URL-ləri)
        - id: product-uploads
          uri: http://localhost:8083
          predicates:
            - Path=/uploads/**
  security:
    oauth2:
      client:
        registration:
          gateway-client:
            client-id: gateway-client
            client-secret: <secret>
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/birbuket-realm

server:
  port: 8081
version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: kafka_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # 🔥 ƏN VACİB HİSSƏ
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgresdb:
    image: postgres:15
    container_name: birbuket_postgres
    environment:
      POSTGRES_USER: birbuket
      POSTGRES_PASSWORD: arxideya464
      POSTGRES_DB: birbuketdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Yalnız ilk volume yaradılışında işləyir — auth/product/order/plantdoctor DB-ləri
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-databases.sql

  # Lokal SMTP: qəbul üçün brauzer http://localhost:8025 ; Gmail üçün .env dəyiş və bu servisi söndür
  mailpit:
    image: axllent/mailpit:latest
    container_name: birbuket_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data: